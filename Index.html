<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทางเข้าระบบข้อมูลนักเรียน</title>
    <link href="https://script.google.com/macros/s/AKfycbzqP1c1AQu7NhlMGZwMYYMPD9vrUWgdXTjmEl4VbfufeeilXLTy6C_czUhUm-Cb8hbj/exec" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fcf8f2;
            font-family: 'Sarabun', sans-serif;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid #ffc107; /* สีเหลือง */
            border-bottom: 8px solid #198754; /* สีเขียว */
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #8b0000; margin-bottom: 10px; } /* สีแดง */
        p { color: #555; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background-color: #198754;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #146c43; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏫 ระบบข้อมูลนักเรียน ม.6</h1>
        <p>ยินดีต้อนรับ! กรุณากดปุ่มด้านล่างเพื่อเข้าสู่ระบบตรวจสอบสถานะและบันทึกข้อมูลของคุณ</p>
        
        <a href="#" class="btn">เข้าสู่หน้าจอระบบ 🚀</a>
    </div>
</body>
</html>
